name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build plugin
        run: npm run build

      - name: Package release assets
        id: package
        run: |
          mkdir -p dist
          cp manifest.json main.js versions.json dist/
          if [ -f styles.css ]; then
            cp styles.css dist/
          fi

          cd dist
          FILES=(manifest.json main.js versions.json)
          if [ -f styles.css ]; then
            FILES+=(styles.css)
          fi

          ZIP_NAME="obsidian-waveanalyzer-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP_NAME" "${FILES[@]}"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
